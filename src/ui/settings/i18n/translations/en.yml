permission_content:
  intro: "\"Honor Magic Vision\" is an application that provides animation engine, desktop app management, AI control center, AI scene perception, and AI intelligent recommendation services for Honor users. Before using this application, please read the following terms carefully. To implement the above functions, this application needs to connect to the network and collect and use the following information:"
  info_device: "\u00b7 Device information, including device identifiers"
  info_network: "\u00b7 Network information, including device IP address"
  info_other: "\u00b7 Other relevant data you submit to us, including surveys"
  user_experience: "If you join the User Experience Improvement Program, this application will collect and process system functions and application usage logs, fault logs, device information, and system information. The above data will be transmitted and stored on servers in the People's Republic of China."
  service: "To run this application normally, it automatically runs a resident service and tray application at startup. If you do not agree to our collection of the above information, this application will not be able to run normally. After agreeing, you can terminate the collection and processing of the above data at any time through the \"Stop Service\" function in \"Settings\"."
  retention: "The above information will be transmitted and stored on servers in the People's Republic of China. We will only retain your personal information for the time necessary to achieve the purposes stated in this statement, and will delete or anonymize your personal information after exceeding the following retention period, unless otherwise required by laws and regulations."
  uninstall_prefix: "After you uninstall Honor Magic Vision, the records of agreeing to "
  uninstall_suffix: " will be deleted immediately."

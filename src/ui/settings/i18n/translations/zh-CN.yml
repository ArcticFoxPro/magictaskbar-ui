permission_content:
  intro: "\"荣耀Magic视界\"是一款为荣耀个人提供动效引擎、桌面应用管理、AI控制中心、AI场景感知和AI智能推荐等服务的应用，您在使用本应用之前，应仔细阅读以下服务条款。为实现上述功能，本应用使用过程中需要联网并需收集、使用您的下列信息："
  info_device: "· 设备信息，包括设备标识符"
  info_network: "· 网络信息，包括设备IP地址"
  info_other: "· 您向我们提交的其他相关数据，包括调查问卷"
  user_experience: "如果您加入用户体验改进计划，则本应用会收集并处理系统功能以及应用程序使用日志、故障日志、设备信息和系统信息。上述数据将会传输并保存至中华人民共和国境内的服务器。"
  service: "为正常运行本应用，本应用开机自动运行一个常驻服务和托盘应用，如果您不同意我们采集上述信息，将导致本应用无法正常运行。同意之后，您可随时通过\"设置\"中的\"停止服务\"功能以终止以上数据的收集和处理。"
  retention: "上述信息将会传输并保存至中华人民共和国境内的服务器。我们仅在实现本声明所述目的所必需的时间内保留您的个人信息，并在超出下述保留时间后删除或匿名化处理您的个人信息，除非法律法规另有要求。"
  uninstall_prefix: "在您卸载荣耀Magic视界后，同意"
  uninstall_suffix: "记录将立刻删除。"
